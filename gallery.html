<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="gallery-container">
        <h1>Photo Gallery</h1>

        <div class="gallery">

            <div class="gallery-item landscape">
                <img src="images/books/s-l1600-2.jpg" alt="Mountain View">
                <div class="caption">
                    <h3>Mountain View</h3>
                    <p>Sunrise over the peaks.</p>
                </div>
            </div>

            <div class="gallery-item portrait">
                <img src="images/photo2.jpg" alt="Waterfall">
                <div class="caption">
                    <h3>Waterfall</h3>
                    <p>Hidden canyon waterfall.</p>
                </div>
            </div>

            <div class="gallery-item landscape">
                <img src="images/photo3.jpg" alt="Beach">
                <div class="caption">
                    <h3>Beach</h3>
                    <p>Afternoon along the coast.</p>
                </div>
            </div>

            <div class="gallery-item portrait">
                <img src="images/photo4.jpg" alt="Forest Trail">
                <div class="caption">
                    <h3>Forest Trail</h3>
                    <p>Misty morning hike.</p>
                </div>
            </div>

            <div class="gallery-item landscape">
                <img src="images/photo5.jpg" alt="Desert">
                <div class="caption">
                    <h3>Desert</h3>
                    <p>Golden hour in the dunes.</p>
                </div>
            </div>

            <div class="gallery-item portrait">
                <img src="images/photo6.jpg" alt="City Lights">
                <div class="caption">
                    <h3>City Lights</h3>
                    <p>Downtown after dark.</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
